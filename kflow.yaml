name: ofp-sam-bet-2026-results
description: Build report-ready BET 2026 figures, tables, and report section seeds from upstream model payloads.
command: bash run.sh
docker_image: ghcr.io/pacificcommunity/tuna-flow:v1.7
resources:
  cpus: 2
  memory: 12GB
  disk: 8GB

env:
  JOB_TITLE: BET results
  JOB_DESCRIPTION: Build report-ready figures and tables from upstream model payloads.
  JOB_KEY: results
  FLOW_GROUP: bet-2026-base
  PLOT_TITLE: BET 2026 report-ready figures
  PLOT_MAX_FISHERIES: "18"
  FLOW_SPECIES: BET
  FLOW_SPECIES_LABEL: bigeye tuna
  FLOW_ASSESSMENT_YEAR: "2026"
  PLOT_RENDER_REVIEW_HTML: "false"
  REPORT_QMD: assessment-report.qmd
  REPORT_FILE_STEM: bet-2026-report
  KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
  KFLOW_RUNTIME_UPDATE: auto
  KFLOW_RUNTIME_PACKAGES: mfclshiny=PacificCommunity/mfclshiny@9bd29ff
  KFLOW_RUNTIME_GITHUB_AUTH: "true"
  KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
  MFCLSHINY_REPORT_DPI: "180"
  MFCLSHINY_OPTIMIZE_FIGURES: "false"
  PLOT_OPTIMIZE_FIGURES: "true"
  PLOT_OPTIMIZE_MODE: lossy
  PLOT_PNGQUANT_QUALITY: "60-85"
  PLOT_WEBP_FIGURES: "true"
  PLOT_WEBP_QUALITY: "72"
  PLOT_PDF_JPEG_FIGURES: "true"
  PLOT_JPEG_QUALITY: "82"
  PLOT_JPEG_SAMPLING_FACTOR: "4:2:0"
  KFLOW_REPORT_COMMIT_GENERATED: "true"
  KFLOW_REPORT_PUSH_GENERATED: "true"
  KFLOW_REPORT_PUBLISH_REQUIRED: "true"
input_jobs:
  - report: ofp-sam-bet-2026-stepwise
    latest: 1
output_patterns:
  - outputs/**
local_apps:
  - key: mfclshiny
    label: MFCL Shiny
    icon: chart-no-axes-combined
    runner: local-docker-ssh
    cpus: "1"
    memory: 8g
    archive_sources:
      - inputs
    container_port: 3838
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      VECLIB_MAXIMUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: "true"
      MFCLSHINY_REPORT_DPI: "96"
      MFCLSHINY_OPTIMIZE_FIGURES: "true"
    command: >-
      Rscript -e 'Sys.setenv(OMP_NUM_THREADS = "1", OPENBLAS_NUM_THREADS = "1", MKL_NUM_THREADS = "1", VECLIB_MAXIMUM_THREADS = "1", NUMEXPR_NUM_THREADS = "1", MFCLSHINY_MODEL_DIR = Sys.getenv("KFLOW_LOCAL_APP_INPUT_DIR", "/kflow/inputs"), MFCLSHINY_EXPORT_DIR = "/kflow/work/export", R_REMOTES_NO_ERRORS_FROM_WARNINGS = "true"); options(bitmapType = "cairo", Ncpus = 1L); lib <- Sys.getenv("KFLOW_LOCAL_APP_R_LIBS", "/kflow/package-cache/R-library"); dir.create(lib, recursive = TRUE, showWarnings = FALSE); .libPaths(unique(c(lib, .libPaths()))); if (!requireNamespace("mfclshiny", quietly = TRUE)) { options(repos = c(CRAN = "https://cloud.r-project.org")); if (!requireNamespace("remotes", quietly = TRUE)) utils::install.packages("remotes", lib = lib, quiet = TRUE); remotes::install_github("PacificCommunity/mfclshiny", ref = "9bd29ff", lib = lib, upgrade = "never", quiet = TRUE) }; try({ ns <- asNamespace("parallel"); unlockBinding("detectCores", ns); assign("detectCores", function(...) 1L, envir = ns); lockBinding("detectCores", ns) }, silent = TRUE); dir.create("/kflow/work/export", recursive = TRUE, showWarnings = FALSE); mfclshiny::run_mfclshiny(model_dir = Sys.getenv("KFLOW_LOCAL_APP_INPUT_DIR", "/kflow/inputs"), export_dir = "/kflow/work/export", report_ready_export = FALSE, host = "0.0.0.0", port = as.integer(Sys.getenv("PORT", "3838")), launch.browser = FALSE)'
triggers:
  on_success:
    - key: report-from-results
      report: ofp-sam-bet-2026-report
      input_jobs:
        - "{{ job.id }}"
      env:
        FLOW_GROUP: "{{ job.config.FLOW_GROUP }}"
        JOB_TITLE: BET report
        JOB_KEY: report
        JOB_DESCRIPTION: Render the assessment report from generated BET results.
        RESULTS_JOB_ID: "{{ job.id }}"
        RESULTS_JOB_IDS: "{{ job.id }}"
        FLOW_SPECIES: "{{ job.config.FLOW_SPECIES }}"
        FLOW_SPECIES_LABEL: "{{ job.config.FLOW_SPECIES_LABEL }}"
        FLOW_ASSESSMENT_YEAR: "{{ job.config.FLOW_ASSESSMENT_YEAR }}"
        REPORT_QMD: "{{ job.config.REPORT_QMD }}"
        REPORT_FILE_STEM: "{{ job.config.REPORT_FILE_STEM }}"
        KFLOW_REPORT_COMMIT_GENERATED: "{{ job.config.KFLOW_REPORT_COMMIT_GENERATED }}"
        KFLOW_REPORT_PUSH_GENERATED: "{{ job.config.KFLOW_REPORT_PUSH_GENERATED }}"
        KFLOW_REPORT_PUBLISH_REQUIRED: "{{ job.config.KFLOW_REPORT_PUBLISH_REQUIRED }}"
      tags:
        auto: "true"
        stage: report
job_config:
  optional:
    - TRIGGER_NEXT
    - FLOW_GROUP
    - JOB_TITLE
    - JOB_DESCRIPTION
    - JOB_KEY
    - PLOT_TITLE
    - PLOT_MAX_FISHERIES
    - FLOW_SPECIES
    - FLOW_SPECIES_LABEL
    - FLOW_ASSESSMENT_YEAR
    - PLOT_RENDER_REVIEW_HTML
    - REPORT_QMD
    - REPORT_FILE_STEM
    - KFLOW_REPORT_COMMIT_GENERATED
    - KFLOW_REPORT_PUSH_GENERATED
    - KFLOW_REPORT_PUBLISH_REQUIRED
    - REPORT_READY_PATH_PREFIX
    - KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
    - KFLOW_RUNTIME_UPDATE
    - KFLOW_RUNTIME_PACKAGES
    - KFLOW_RUNTIME_GITHUB_AUTH
    - KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME
    - MFCLSHINY_REPORT_DPI
    - MFCLSHINY_OPTIMIZE_FIGURES
    - PLOT_OPTIMIZE_FIGURES
    - PLOT_OPTIMIZE_MODE
    - PLOT_PNGQUANT_QUALITY
    - PLOT_PNGQUANT_SPEED
    - PLOT_WEBP_FIGURES
    - PLOT_WEBP_QUALITY
    - PLOT_PDF_JPEG_FIGURES
    - PLOT_JPEG_QUALITY
    - PLOT_JPEG_SAMPLING_FACTOR
